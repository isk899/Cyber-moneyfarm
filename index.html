<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONEY CYBER-FARM | Cloud Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-main: #020408;
            --panel-bg: rgba(6, 10, 18, 0.95);
            --neon-blue: #00f0ff;
            --neon-purple: #b026ff;
            --neon-gold: #ffd700;
            --neon-red: #ff0055;
            --text-main: #e2e8f0;
        }

        * { box-sizing: border-box; user-select: none; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0; padding: 20px; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        /* --- СТИЛИ АВТОРИЗАЦИИ --- */
        #auth-container {
            display: flex; justify-content: center; align-items: center; 
            height: 80vh; width: 100%;
        }

        .auth-card {
            background: var(--panel-bg); border: 2px solid var(--neon-purple); /* Фиолетовый по умолчанию для регистрации */
            border-radius: 16px; padding: 40px; width: 100%; max-width: 400px;
            text-align: center; box-shadow: 0 0 30px rgba(176, 38, 255, 0.2);
            transition: all 0.3s ease;
        }

        .auth-card h2 {
            margin: 0 0 10px 0; color: #fff; text-shadow: 0 0 15px var(--neon-purple);
            text-transform: uppercase; letter-spacing: 2px;
        }

        .auth-card p { color: #94a3b8; font-size: 14px; margin-bottom: 25px; }

        .auth-input {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid #334155;
            color: #fff; padding: 12px 15px; border-radius: 8px; margin-bottom: 15px;
            outline: none; transition: 0.3s;
        }
        .auth-input:focus { border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(0,240,255,0.2); }

        .auth-btn {
            width: 100%; background: rgba(176, 38, 255, 0.1); border: 1px solid var(--neon-purple);
            color: #fff; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }
        .auth-btn:hover { background: var(--neon-purple); box-shadow: 0 0 20px rgba(176, 38, 255, 0.5); }

        .auth-toggle {
            margin-top: 20px; font-size: 14px; color: #94a3b8; cursor: pointer; transition: 0.2s;
        }
        .auth-toggle span { color: var(--neon-blue); font-weight: bold; text-decoration: none; }
        .auth-toggle:hover span { text-shadow: 0 0 10px var(--neon-blue); }

        /* --- СТИЛИ ИГРЫ --- */
        #game-container { width: 100%; max-width: 1000px; display: none; }
        
        header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #1e293b; padding-bottom: 20px; margin-bottom: 20px;
        }
        
        .brand h1 { margin: 0; color: var(--neon-gold); text-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
        .hud { display: flex; gap: 15px; }
        .hud-box {
            background: var(--panel-bg); border: 1px solid #1e293b;
            padding: 10px 20px; border-radius: 12px; font-weight: bold;
        }
        .box-balance { color: var(--neon-gold); border-color: rgba(255,215,0,0.3); }
        .btn-logout { 
            background: transparent; border: 1px solid var(--neon-red); 
            color: var(--neon-red); padding: 10px 20px; border-radius: 8px; cursor: pointer;
        }
        .btn-logout:hover { background: var(--neon-red); color: #fff; }
        
        .game-area { display: flex; justify-content: center; align-items: center; height: 50vh; color: #64748b; }
    </style>
</head>
<body>

    <div id="auth-container">
        <div class="auth-card" id="auth-card">
            <h2 id="auth-title">Регистрация</h2>
            <p id="auth-subtitle">Создание новой ячейки в базе данных</p>
            
            <input type="email" id="email" class="auth-input" placeholder="Введите E-mail">
            <input type="password" id="password" class="auth-input" placeholder="Введите пароль">
            
            <button class="auth-btn" id="auth-submit-btn" onclick="handleAuth()">Зарегистрироваться</button>
            <div class="auth-toggle" onclick="toggleAuthMode()" id="auth-toggle">
                Уже есть аккаунт? <span>Войти в сеть</span>
            </div>
        </div>
    </div>

    <div id="game-container">
        <header>
            <div class="brand">
                <h1>CYBER-FARM</h1>
            </div>
            <div class="hud">
                <div class="hud-box box-balance">Баланс: <span id="balance-display">0.00</span> $</div>
                <button class="btn-logout" onclick="logout()">Выйти из сети</button>
            </div>
        </header>

        <div class="game-area">
            <h2>Интерфейс фермы загружен. Добро пожаловать!</h2>
        </div>
    </div>

    <script>
        // === ВСТАВЬ СВОИ КЛЮЧИ СЮДА ===
        const SUPABASE_URL = "https://diwjvaukhyjcyvyrbmhg.supabase.co/rest/v1/";
        const SUPABASE_KEY = "sb_publishable_4m367C496__Kx0wwcBmMUQ_vG05ySuz";
        // ==============================

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // По умолчанию isSignUpMode = true (Регистрация)
        let isSignUpMode = true; 

        // Функция переключения между Регистрацией и Входом
        window.toggleAuthMode = function() {
            isSignUpMode = !isSignUpMode;
            const card = document.getElementById('auth-card');
            
            if (isSignUpMode) {
                // Внешний вид для регистрации
                document.getElementById('auth-title').textContent = "Регистрация";
                document.getElementById('auth-title').style.textShadow = "0 0 15px var(--neon-purple)";
                card.style.borderColor = "var(--neon-purple)";
                document.getElementById('auth-submit-btn').style.borderColor = "var(--neon-purple)";
                document.getElementById('auth-subtitle').textContent = "Создание новой ячейки в базе данных";
                document.getElementById('auth-submit-btn').textContent = "Зарегистрироваться";
                document.getElementById('auth-toggle').innerHTML = "Уже есть аккаунт? <span>Войти в сеть</span>";
            } else {
                // Внешний вид для входа
                document.getElementById('auth-title').textContent = "Вход в систему";
                document.getElementById('auth-title').style.textShadow = "0 0 15px var(--neon-blue)";
                card.style.borderColor = "var(--neon-blue)";
                document.getElementById('auth-submit-btn').style.borderColor = "var(--neon-blue)";
                document.getElementById('auth-subtitle').textContent = "Получение доступа к квантовым грядкам";
                document.getElementById('auth-submit-btn').textContent = "Войти";
                document.getElementById('auth-toggle').innerHTML = "Нет аккаунта? <span>Создать профиль</span>";
            }
        };

        // Логика авторизации
        window.handleAuth = async function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                alert("Заполните все поля!");
                return;
            }

            if (isSignUpMode) {
                const { data, error } = await supabase.auth.signUp({ email, password });
                if (error) alert("Ошибка регистрации: " + error.message);
                else {
                    alert("Профиль создан! Теперь вы можете войти.");
                    toggleAuthMode(); // Автоматически переключаем на вход после успешной регистрации
                }
            } else {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) alert("Ошибка входа: " + error.message);
            }
        };

        // Логика выхода
        window.logout = async function() {
            await supabase.auth.signOut();
        };

        // Отслеживание состояния сессии (вошел пользователь или нет)
        supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                // Пользователь авторизован - показываем игру
                document.getElementById('auth-container').style.display = 'none';
                document.getElementById('game-container').style.display = 'block';
            } else {
                // Пользователь не авторизован - показываем форму
                document.getElementById('auth-container').style.display = 'flex';
                document.getElementById('game-container').style.display = 'none';
            }
        });
    </script>
</body>
</html>
