<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MONEY CYBER-FARM</title>

  <!-- FontAwesome для иконок -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <!-- Google Fonts: киберпанк-шрифты -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>

  <style>
    /* ============================================================
       ТОКЕНЫ: МЕНЯЙ ЦВЕТА ЗДЕСЬ
       ============================================================ */
    :root {
      --bg-deep:    #05030f;   /* фон страницы */
      --bg-card:    #0d0820;   /* фон карточек */
      --bg-field:   #0a0618;   /* фон грядок */
      --neon-purple:#b44fff;   /* основной акцент */
      --neon-blue:  #00d4ff;   /* вторичный акцент */
      --neon-gold:  #ffd700;   /* валюта / награда */
      --neon-green: #39ff14;   /* таймер / прогресс */
      --text-main:  #e8e0ff;
      --text-dim:   #7a6fa0;
      --border:     #2a1a4a;
      --glow-purple: 0 0 12px #b44fff88, 0 0 30px #b44fff44;
      --glow-blue:   0 0 12px #00d4ff88, 0 0 30px #00d4ff44;
      --glow-gold:   0 0 12px #ffd70088, 0 0 30px #ffd70044;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-deep);
      color: var(--text-main);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Фоновая сетка в стиле киберпанк */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(180,79,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(180,79,255,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* ============================================================
       AUTH — ЭКРАН АВТОРИЗАЦИИ
       ============================================================ */
    #auth-screen {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at center, #120824 0%, #05030f 70%);
    }

    .auth-box {
      background: var(--bg-card);
      border: 1px solid var(--neon-purple);
      box-shadow: var(--glow-purple);
      border-radius: 12px;
      padding: 40px 36px;
      width: 380px;
      position: relative;
      overflow: hidden;
    }

    /* декоративная полоса сверху */
    .auth-box::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple), var(--neon-gold));
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .auth-logo h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: 3px;
      background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-shadow: none;
    }
    .auth-logo p { color: var(--text-dim); font-size: .8rem; margin-top: 4px; }

    /* заголовок формы */
    .auth-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      color: var(--neon-purple);
      text-align: center;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    /* поля ввода */
    .auth-input {
      width: 100%;
      background: #0a0518;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-main);
      font-family: 'Share Tech Mono', monospace;
      font-size: .9rem;
      padding: 12px 14px;
      margin-bottom: 14px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .auth-input:focus {
      border-color: var(--neon-purple);
      box-shadow: 0 0 8px var(--neon-purple);
    }
    .auth-input::placeholder { color: var(--text-dim); }

    /* основная кнопка */
    .btn-primary {
      width: 100%;
      padding: 13px;
      border: none; border-radius: 6px;
      background: linear-gradient(90deg, #7b1fff, #b44fff);
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      font-size: .85rem;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      box-shadow: var(--glow-purple);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 20px #b44fffaa; }
    .btn-primary:active { transform: translateY(0); }

    /* переключатель режима */
    .auth-switch {
      text-align: center;
      margin-top: 18px;
      color: var(--text-dim);
      font-size: .82rem;
    }
    .auth-switch span {
      color: var(--neon-blue);
      cursor: pointer;
      text-decoration: underline;
    }
    .auth-switch span:hover { color: var(--neon-purple); }

    /* сообщение об ошибке */
    #auth-error {
      color: #ff4d6d;
      font-size: .8rem;
      text-align: center;
      min-height: 20px;
      margin-top: 10px;
            /* ============================================================
       GAME — ИГРОВОЙ ИНТЕРФЕЙС
       ============================================================ */
    #game-screen { display: none; position: relative; z-index: 1; }

    /* --- HEADER --- */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 32px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 50;
    }

    .header-logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.1rem; font-weight: 900;
      letter-spacing: 3px;
      background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    /* блок баланса в хедере */
    .balance-block {
      display: flex; align-items: center; gap: 10px;
      background: #0a0518;
      border: 1px solid var(--neon-gold);
      border-radius: 8px;
      padding: 8px 18px;
      box-shadow: var(--glow-gold);
    }
    .balance-block i { color: var(--neon-gold); font-size: 1.1rem; }
    .balance-label { color: var(--text-dim); font-size: .75rem; }

    /* значение баланса — меняется в JS через window.updateBalance() */
    #balance-display {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.2rem; font-weight: 700;
      color: var(--neon-gold);
    }

    /* кнопка выхода */
    .btn-logout {
      background: transparent;
      border: 1px solid var(--neon-purple);
      color: var(--neon-purple);
      font-family: 'Share Tech Mono', monospace;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: .85rem;
      transition: background .2s, box-shadow .2s;
    }
    .btn-logout:hover {
      background: #b44fff22;
      box-shadow: var(--glow-purple);
    }

    /* --- ОСНОВНАЯ СЕТКА --- */
    .game-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 24px;
      padding: 28px 32px;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* --- МАГАЗИН СЕМЯН --- */
    .shop {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      align-self: start;
      position: sticky; top: 80px;
    }

    .section-title {
      font-family: 'Orbitron', sans-serif;
      font-size: .85rem;
      letter-spacing: 3px;
      color: var(--neon-blue);
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .section-title i { font-size: .9rem; }

    /* карточка семени */
    .seed-card {
      background: var(--bg-field);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: border-color .2s, box-shadow .2s, transform .15s;
      position: relative;
      overflow: hidden;
    }
    .seed-card::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, transparent 60%, rgba(180,79,255,.07));
    }
    .seed-card:hover {
      border-color: var(--neon-purple);
      box-shadow: var(--glow-purple);
      transform: translateX(4px);
    }
    .seed-card.selected {
      border-color: var(--neon-gold);
      box-shadow: var(--glow-gold);
    }

    .seed-name {
      font-family: 'Orbitron', sans-serif;
      font-size: .8rem; font-weight: 700;
      color: var(--text-main);
      margin-bottom: 6px;
    }
    .seed-emoji { font-size: 1.4rem; margin-right: 6px; }

    .seed-stats {
      display: flex; flex-direction: column; gap: 3px;
      font-size: .75rem; color: var(--text-dim);
    }
    .seed-stats span { display: flex; align-items: center; gap: 6px; }
    .stat-cost  { color: #ff6b9d; }
    .stat-yield { color: var(--neon-green); }
    .stat-time  { color: var(--neon-blue); }

    /* подсказка выбора */
    .shop-hint {
      font-size: .72rem; color: var(--text-dim);
      text-align: center; margin-top: 8px;
      line-height: 1.5;
    }

    /* --- ПОЛЕ С ГРЯДКАМИ --- */
    .field-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    /* сетка 2×3 для 6 грядок */
    .beds-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 4px;
    }

    /* одна грядка */
    .bed {
      background: var(--bg-field);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      min-height: 150px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, box-shadow .2s, transform .15s;
      position: relative;
      overflow: hidden;
    }

    /* пустая грядка */
    .bed.empty {
      border-style: dashed;
      color: var(--text-dim);
    }
    .bed.empty:hover {
      border-color: var(--neon-purple);
      box-shadow: var(--glow-purple);
      transform: scale(1.03);
    }
    .bed.empty .bed-icon { font-size: 2rem; margin-bottom: 8px; opacity: .4; }
    .bed.empty .bed-label { font-size: .75rem; }

    /* грядка в росте */
    .bed.growing { border-color: var(--neon-blue); cursor: default; }
    .bed.growing:hover { transform: none; }

    /* грядка готова к сбору */
    .bed.ready {
      border-color: var(--neon-green);
      box-shadow: 0 0 16px #39ff1466, 0 0 40px #39ff1422;
      animation: pulse-ready 1.5s ease-in-out infinite;
    }
    @keyframes pulse-ready {
      0%,100% { box-shadow: 0 0 16px #39ff1466, 0 0 40px #39ff1422; }
      50%      { box-shadow: 0 0 28px #39ff14aa, 0 0 60px #39ff1444; }
    }
    .bed.ready:hover { transform: scale(1.04); }

    /* emoji растения на грядке */
    .bed-plant-emoji { font-size: 2.4rem; margin-bottom: 8px; }

    .bed-plant-name {
      font-family: 'Orbitron', sans-serif;
      font-size: .7rem; font-weight: 700;
      color: var(--text-main);
      margin-bottom: 8px;
        
    /* прогресс-бар роста */
    .progress-wrap {
      width: 100%; background: #1a0f30;
      border-radius: 20px; height: 8px;
      overflow: hidden; margin-bottom: 6px;
    }
    .progress-bar {
      height: 100%; border-radius: 20px;
      background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
      box-shadow: 0 0 8px var(--neon-purple);
      /* ширина задаётся через JS, анимация через transition */
      transition: width .5s linear;
    }

    .bed-timer {
      font-size: .72rem; color: var(--neon-blue);
    }

    /* кнопка "Собрать" */
    .bed-collect-btn {
      background: linear-gradient(90deg, #1a7a1a, #39ff14);
      border: none; border-radius: 6px;
      color: #000; font-family: 'Orbitron', sans-serif;
      font-size: .7rem; font-weight: 700;
      padding: 8px 14px; cursor: pointer;
      letter-spacing: 1px;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 0 10px #39ff1466;
    }
    .bed-collect-btn:hover { transform: scale(1.06); }

    .bed-yield-label {
      font-size: .72rem; color: var(--neon-gold);
      margin-bottom: 6px;
    }

    /* уведомление о сборе урожая */
    #toast {
      position: fixed; bottom: 30px; right: 30px; z-index: 200;
      background: var(--bg-card);
      border: 1px solid var(--neon-green);
      box-shadow: 0 0 20px #39ff1466;
      color: var(--neon-green);
      font-family: 'Orbitron', sans-serif;
      font-size: .85rem; letter-spacing: 1px;
      padding: 14px 22px;
      border-radius: 8px;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity .3s, transform .3s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    /* ============================================================
       АДАПТИВ
       ============================================================ */
    @media (max-width: 768px) {
      .game-layout {
        grid-template-columns: 1fr;
        padding: 16px;
      }
      .shop { position: static; }
      .beds-grid { grid-template-columns: repeat(2, 1fr); }
      header { padding: 10px 16px; }
      .header-logo { font-size: .85rem; }
    }
  </style>
</head>
<body>

<!-- ============================================================
     ЭКРАН АВТОРИЗАЦИИ
     ============================================================ -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <h1>⚡ MONEY CYBER-FARM</h1>
      <p>// INITIALIZE SESSION //</p>
    </div>

    <!-- Заголовок меняется JS при переключении режима -->
    <div class="auth-title" id="auth-title">[ РЕГИСТРАЦИЯ ]</div>

    <input class="auth-input" id="auth-email"    type="email"    placeholder="EMAIL"/>
    <input class="auth-input" id="auth-password" type="password" placeholder="ПАРОЛЬ (мин. 6 символов)"/>

    <!-- Кнопка вызывает window.handleAuth() -->
    <button class="btn-primary" onclick="window.handleAuth()">
      <i class="fa fa-bolt"></i>&nbsp; <span id="auth-btn-label">СОЗДАТЬ АККАУНТ</span>
    </button>

    <div id="auth-error"></div>

    <div class="auth-switch">
      <span id="auth-switch-text">Уже есть аккаунт? <span onclick="window.toggleAuthMode()">Войти</span></span>
    </div>
  </div>
</div>

<!-- ============================================================
     ИГРОВОЙ ИНТЕРФЕЙС
     ============================================================ -->
<div id="game-screen">

  <!-- HEADER -->
  <header>
    <div class="header-logo">⚡ MONEY CYBER-FARM</div>

    <div class="balance-block">
      <i class="fa fa-coins"></i>
      <div>
        <div class="balance-label">БАЛАНС</div>
        <!-- Значение обновляется через window.updateBalance() -->
        <div id="balance-display">$0</div>
      </div>
    </div>

    <button class="btn-logout" onclick="window.logout()">
      <i class="fa fa-right-from-bracket"></i> ВЫЙТИ
    </button>
  </header>

  <!-- ОСНОВНАЯ СЕТКА -->
  <div class="game-layout">

    <!-- МАГАЗИН СЕМЯН -->
    <aside class="shop">
      <div class="section-title">
        <i class="fa fa-store"></i> МАГАЗИН СЕМЯН
      </div>
             <!--
        СЕМЕНА: чтобы изменить параметры — правь объект SEEDS в JS ниже.
        Здесь только шаблон — реальные значения подставляются через JS.
      -->
      <div id="seeds-list"></div>

      <div class="shop-hint">
        ① Выбери семя &nbsp;②&nbsp; Кликни на пустую грядку
      </div>
    </aside>

    <!-- ПОЛЕ -->
    <section class="field-section">
      <div class="section-title">
        <i class="fa fa-seedling"></i> ПОЛЕ (6 ГРЯДОК)
      </div>
      <!-- Грядки генерируются JS в #beds-grid -->
      <div class="beds-grid" id="beds-grid"></div>
    </section>

  </div>
</div>

<!-- УВЕДОМЛЕНИЕ О СБОРЕ -->
<div id="toast"></div>

<!-- ============================================================
     SUPABASE + ИГРОВАЯ ЛОГИКА
     ============================================================ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
/* ==============================================================
   КОНФИГУРАЦИЯ SUPABASE
   → Вставь свои ключи из Project Settings → API
   ============================================================== */
const SUPABASE_URL = 'https://diwjvaukhyjcyvyrbmhg.supabase.co';      // пример: https://xxxx.supabase.co
const SUPABASE_KEY = 'sb_publishable_4m367C496__Kx0wwcBmMUQ_vG05ySuz'; // anon/public ключ

const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ==============================================================
   ПАРАМЕТРЫ СЕМЯН
   ─────────────────────────────────────────────────────────────
   Чтобы изменить семя: правь этот массив.
     cost     — цена посадки ($)
     yield    — доход при сборе ($)
     growTime — время роста в секундах
   ============================================================== */
const SEEDS = [
  {
    id: 'onion',
    name: 'Квантовый Лук',
    emoji: '🧅',
    cost: 10,      // ← ИЗМЕНИТЬ ЦЕНУ
    yield: 25,     // ← ИЗМЕНИТЬ ДОХОД
    growTime: 10,  // ← ИЗМЕНИТЬ ВРЕМЯ (секунды)
  },
  {
    id: 'carrot',
    name: 'Неоновая Морковь',
    emoji: '🥕',
    cost: 35,
    yield: 90,
    growTime: 30,
  },
  {
    id: 'tomato',
    name: 'Гипер-Томат',
    emoji: '🍅',
    cost: 100,
    yield: 280,
    growTime: 60,
  },
];

/* ==============================================================
   СТАРТОВЫЙ БАЛАНС НОВОГО ИГРОКА ($)
   Меняй это значение чтобы выдавать новичкам другую сумму.
   ============================================================== */
const START_BALANCE = 150;

/* ==============================================================
   СОСТОЯНИЕ ИГРЫ
   ============================================================== */
let balance = START_BALANCE;   // текущий баланс игрока
let selectedSeed = null;       // выбранное семя (объект из SEEDS)

/*
  beds[i] = null          → грядка пуста
  beds[i] = {             → грядка занята
    seed,                 → объект семени
    startTime,            → Date.now() момент посадки
    timerId,              → setInterval id
  }
*/
const beds = Array(6).fill(null);

/* ==============================================================
   РЕЖИМ АВТОРИЗАЦИИ: 'register' | 'login'
   ============================================================== */
let authMode = 'register';

/* --------------------------------------------------------------
   ПЕРЕКЛЮЧЕНИЕ РЕЖИМА (Войти ↔ Регистрация)
   -------------------------------------------------------------- */
window.toggleAuthMode = function () {
  authMode = authMode === 'register' ? 'login' : 'register';
  const isReg = authMode === 'register';
  document.getElementById('auth-title').textContent    = isReg ? '[ РЕГИСТРАЦИЯ ]' : '[ ВХОД ]';
  document.getElementById('auth-btn-label').textContent = isReg ? 'СОЗДАТЬ АККАУНТ' : 'ВОЙТИ';
  document.getElementById('auth-switch-text').innerHTML = isReg
    ? 'Уже есть аккаунт? <span onclick="window.toggleAuthMode()">Войти</span>'
    : 'Нет аккаунта? <span onclick="window.toggleAuthMode()">Зарегистрироваться</span>';
  document.getElementById('auth-error').textContent = '';
};

/* --------------------------------------------------------------
   АВТОРИЗАЦИЯ / РЕГИСТРАЦИЯ
   -------------------------------------------------------------- */
window.handleAuth = async function () {
  const email    = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const errEl    = document.getElementById('auth-error');
  errEl.textContent = '';

  if (!email || !password) {
    errEl.textContent = '⚠ Заполни email и пароль';
    return;
  }

  let error;
  if (authMode === 'register') {
    ({ error } = await _supabase.auth.signUp({ email, password }));
  } else {
    ({ error } = await _supabase.auth.signInWithPassword({ email, password }));
  }

  if (error) {
    errEl.textContent = '⚠ ' + error.message;
    return;
  }

  // Успех → показываем игру
  showGame();
};

/* --------------------------------------------------------------
   ВЫХОД
   -------------------------------------------------------------- */
window.logout = async function () {
  await _supabase.auth.signOut();
  // Очищаем все таймеры грядок
  beds.forEach((b, i) => {
    if (b?.timerId) clearInterval(b.timerId);
    beds[i] = null;
  });
  selectedSeed = null;
  balance = START_BALANCE;
    document.getElementById('game-screen').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
};

/* --------------------------------------------------------------
   ПРОВЕРКА СЕССИИ ПРИ ЗАГРУЗКЕ
   -------------------------------------------------------------- */
(async () => {
  const { data: { session } } = await _supabase.auth.getSession();
  if (session) {
    showGame();
  }
})();

/* ==============================================================
   ПОКАЗ ИГРЫ
   ============================================================== */
function showGame() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  renderShop();
  renderBeds();
  updateBalance();
}

/* ==============================================================
   ОБНОВЛЕНИЕ БАЛАНСА В ХЕДЕРЕ
   ============================================================== */
window.updateBalance = function () {
  document.getElementById('balance-display').textContent = '$' + balance;
};

/* ==============================================================
   РЕНДЕР МАГАЗИНА
   ============================================================== */
function renderShop() {
  const list = document.getElementById('seeds-list');
  list.innerHTML = '';

  SEEDS.forEach(seed => {
    const card = document.createElement('div');
    card.className = 'seed-card';
    card.id = 'seed-card-' + seed.id;
    card.innerHTML = `
      <div class="seed-name">
        <span class="seed-emoji">${seed.emoji}</span>${seed.name}
      </div>
      <div class="seed-stats">
        <span class="stat-cost">  <i class="fa fa-tag"></i>   Цена:   $${seed.cost}</span>
        <span class="stat-yield"> <i class="fa fa-coins"></i> Доход:  $${seed.yield}</span>
        <span class="stat-time">  <i class="fa fa-clock"></i> Рост:   ${seed.growTime}с</span>
      </div>
    `;
    card.onclick = () => selectSeed(seed);
    list.appendChild(card);
  });
}

/* --------------------------------------------------------------
   ВЫБОР СЕМЕНИ
   -------------------------------------------------------------- */
function selectSeed(seed) {
  selectedSeed = seed;
  // Сбрасываем подсветку всех карточек
  SEEDS.forEach(s => {
    document.getElementById('seed-card-' + s.id)?.classList.remove('selected');
  });
  document.getElementById('seed-card-' + seed.id).classList.add('selected');
}

/* ==============================================================
   РЕНДЕР ГРЯДОК
   ============================================================== */
function renderBeds() {
  const grid = document.getElementById('beds-grid');
  grid.innerHTML = '';

  beds.forEach((bed, i) => {
    const el = document.createElement('div');
    el.className = 'bed';
    el.id = 'bed-' + i;

    if (!bed) {
      // ПУСТАЯ ГРЯДКА
      el.classList.add('empty');
      el.innerHTML = `
        <div class="bed-icon"><i class="fa fa-plus"></i></div>
        <div class="bed-label">Пусто — кликни для посадки</div>
      `;
      el.onclick = () => plantSeed(i);

    } else if (!bed.ready) {
      // РАСТЁТ
      el.classList.add('growing');
      el.innerHTML = `
        <div class="bed-plant-emoji">${bed.seed.emoji}</div>
        <div class="bed-plant-name">${bed.seed.name}</div>
        <div class="progress-wrap">
          <div class="progress-bar" id="bar-${i}" style="width:0%"></div>
        </div>
        <div class="bed-timer" id="timer-${i}">—</div>
      `;

    } else {
      // ГОТОВО К СБОРУ
      el.classList.add('ready');
      el.innerHTML = `
        <div class="bed-plant-emoji">${bed.seed.emoji}</div>
        <div class="bed-plant-name">${bed.seed.name}</div>
        <div class="bed-yield-label"><i class="fa fa-coins"></i> +$${bed.seed.yield}</div>
        <button class="bed-collect-btn" onclick="collectHarvest(${i})">
          <i class="fa fa-hand"></i> СОБРАТЬ
        </button>
      `;
    }

    grid.appendChild(el);
  });
}

/* ==============================================================
   ПОСАДКА СЕМЕНИ
   ============================================================== */
function plantSeed(bedIndex) {
  if (!selectedSeed) {
    showToast('⚠ Сначала выбери семя в магазине!', '#ff4d6d');
    return;
  }
  if (balance < selectedSeed.cost) {
    showToast(`⚠ Недостаточно средств! Нужно $${selectedSeed.cost}`, '#ff4d6d');
    return;
  }

  // Списываем стоимость
  balance -= selectedSeed.cost;
  updateBalance();

  const startTime = Date.now();
  const seed = selectedSeed;

  // Стартуем таймер роста
  const timerId = setInterval(() => {
    tickGrowth(bedIndex);
  }, 500); // обновляем прогресс каждые 0.5с

  beds[bedIndex] = { seed, startTime, timerId, ready: false };

  renderBeds();
  showToast(`🌱 Посажено: ${seed.emoji} ${seed.name}`, 'var(--neon-blue)');
}

/* ==============================================================
   ТИК РОСТА (вызывается из setInterval)
   ============================================================== */
function tickGrowth(i) {
  const bed = beds[i];
  if (!bed || bed.ready) return;
    const elapsed  = (Date.now() - bed.startTime) / 1000; // секунды
  const total    = bed.seed.growTime;
  const progress = Math.min(elapsed / total, 1);
  const remain   = Math.max(total - Math.floor(elapsed), 0);

  // Обновляем прогресс-бар
  const bar   = document.getElementById('bar-' + i);
  const timer = document.getElementById('timer-' + i);
  if (bar)   bar.style.width = (progress * 100).toFixed(1) + '%';
  if (timer) timer.textContent = remain > 0 ? `⏱ ${remain}с` : 'ГОТОВО!';

  // Рост завершён
  if (progress >= 1) {
    clearInterval(bed.timerId);
    beds[i].ready = true;
    renderBeds(); // перерисовываем грядку в режим "ready"
    showToast(`✅ ${bed.seed.emoji} ${bed.seed.name} готова к сбору!`, 'var(--neon-green)');
  }
}

/* ==============================================================
   СБОР УРОЖАЯ
   ============================================================== */
window.collectHarvest = function (i) {
  const bed = beds[i];
  if (!bed || !bed.ready) return;

  balance += bed.seed.yield;
  updateBalance();
  showToast(`💰 +$${bed.seed.yield} — ${bed.seed.name} собрана!`, 'var(--neon-gold)');

  beds[i] = null; // грядка снова пуста
  renderBeds();
};

/* ==============================================================
   TOAST-УВЕДОМЛЕНИЕ
   ============================================================== */
let toastTimer = null;
function showToast(msg, color = 'var(--neon-green)') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.borderColor = color;
  el.style.color = color;
  el.style.boxShadow = `0 0 20px ${color}66`;
  el.classList.add('show');

  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
